name: Terraform CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  terraform:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Show Linux System
      run: uname -a

    - name: List Files
      run: ls -la

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: terraform plan